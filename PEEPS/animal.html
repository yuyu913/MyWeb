<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>動物喜好一眼總覽</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background: #f6f7fb;
            color: #333;
        }

        .page {
            padding: 12px;
        }

        .title-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 22px;
            font-weight: 900;
        }

        .subtitle {
            color: #666;
            font-size: 12px;
            font-weight: 700;
        }

        .compact-panel {
            padding: 12px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.07);
        }

        .animal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
            gap: 8px;
        }

        .animal-card {
            position: relative;
            min-height: 108px;
            padding: 7px;
            border: 1px solid #edf0f6;
            border-radius: 12px;
            background: #fbfcff;
            overflow: visible;
        }

        .animal-card.completed-animal {
            border: 2px solid #40c978;
            box-shadow: 0 0 0 2px rgba(64, 201, 120, 0.16);
        }

        .animal-card.completed-animal::after {
            content: "✓";
            position: absolute;
            top: 5px;
            right: 6px;
            width: 17px;
            height: 17px;
            border-radius: 999px;
            background: #40c978;
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            line-height: 17px;
            text-align: center;
        }

        .animal-head {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            margin-bottom: 5px;
        }

        .animal-img-box {
            width: 34px;
            height: 34px;
            flex: 0 0 auto;
            border-radius: 10px;
            border: 1px dashed #cbd5e1;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 10px;
            overflow: hidden;
            cursor: help;
        }

        .animal-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .animal-name {
            min-width: 0;
            font-size: 12px;
            font-weight: 900;
            color: #333;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pref-line {
            display: flex;
            gap: 4px;
            align-items: flex-start;
            min-width: 0;
            margin-top: 4px;
            font-size: 10px;
            font-weight: 800;
            line-height: 1.35;
            color: #555;
        }

        .pref-label {
            flex: 0 0 auto;
            line-height: 1.35;
        }

        .pref-text {
            flex: 1 1 auto;
            min-width: 0;
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            word-break: break-word;
        }

        .pref-text.empty {
            color: #aaa;
        }

        .message {
            padding: 18px;
            border-radius: 14px;
            background: #fff7df;
            color: #9a6b00;
            font-weight: 800;
            line-height: 1.7;
        }

        .animal-tooltip {
            position: fixed;
            z-index: 9999;
            width: 260px;
            max-width: calc(100vw - 24px);
            padding: 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
            border: 1px solid #e7ebf3;
            pointer-events: none;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.12s ease, transform 0.12s ease;
            text-align: left;
        }

        .animal-tooltip.show {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-title {
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 8px;
            color: #333;
        }

        .tooltip-section {
            margin-top: 7px;
            font-size: 12px;
            font-weight: 800;
            color: #555;
        }

        .tooltip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }

        .tooltip-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 7px;
            border-radius: 999px;
            background: #f3f5f8;
            color: #444;
            font-size: 12px;
            font-weight: 800;
        }

        .tooltip-empty {
            color: #999;
            font-size: 12px;
            font-weight: 700;
        }

        .tooltip-complete {
            margin-top: 9px;
            padding: 7px 9px;
            border-radius: 10px;
            background: #e7f8ed;
            color: #16833a;
            font-size: 12px;
            font-weight: 900;
        }

        @media (min-width: 1500px) {
            .animal-grid {
                grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .page {
                padding: 8px;
            }

            .title-row {
                display: block;
            }

            .title {
                font-size: 20px;
                margin-bottom: 4px;
            }

            .compact-panel {
                padding: 8px;
            }

            .animal-grid {
                grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
                gap: 6px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="title-row">
            <div class="title">動物喜好一眼總覽 🐾</div>
            <div class="subtitle">小卡版：滑鼠移到照片可看完整喜歡 / 不喜歡 / 蒐集狀態</div>
        </div>

        <section class="compact-panel">
            <div id="animalGrid" class="animal-grid"></div>
        </section>
    </div>

    <script>
        let data = null;

        const animalGrid = document.getElementById("animalGrid");
        const animalTooltip = document.createElement("div");
        animalTooltip.className = "animal-tooltip";
        document.body.appendChild(animalTooltip);

        async function loadData() {
            try {
                const res = await fetch("animal-data.json?time=" + Date.now());

                if (!res.ok) {
                    throw new Error("讀取 JSON 失敗");
                }

                data = await res.json();
                normalizeAnimalImages();
                renderAnimals();
            } catch (error) {
                animalGrid.innerHTML = `
                    <div class="message">
                        讀不到 animal-data.json，請確認檔案跟 HTML 放在同一個資料夾，並用 localhost 或 Live Server 開啟。
                    </div>
                `;
                console.error(error);
            }
        }

        function getPreference(animal, foodId) {
            return animal.preferences?.[foodId] || data.defaultStatus || "unknown";
        }

        function isAnimalCompleted(animal) {
            return data.foods.every(food => {
                return getPreference(animal, food.id) !== "unknown";
            });
        }

        function getFoodsByStatus(animal, status) {
            return data.foods
                .filter(food => getPreference(animal, food.id) === status)
                .map(food => `${food.emoji || ""} ${food.name || ""}`.trim());
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function renderTooltipList(items) {
            if (items.length === 0) {
                return '<span class="tooltip-empty">無</span>';
            }

            return items
                .map(item => `<span class="tooltip-chip">${escapeHtml(item)}</span>`)
                .join("");
        }

        function showAnimalTooltip(event, animal) {
            const likeFoods = getFoodsByStatus(animal, "like");
            const dislikeFoods = getFoodsByStatus(animal, "dislike");
            const completeText = isAnimalCompleted(animal)
                ? '<div class="tooltip-complete">✅ 已蒐集完成</div>'
                : "";

            animalTooltip.innerHTML = `
                <div class="tooltip-title">${escapeHtml(animal.name || "未命名動物")}</div>
                <div class="tooltip-section">❤️ 喜歡</div>
                <div class="tooltip-list">${renderTooltipList(likeFoods)}</div>
                <div class="tooltip-section">🚫 不喜歡</div>
                <div class="tooltip-list">${renderTooltipList(dislikeFoods)}</div>
                ${completeText}
            `;

            animalTooltip.classList.add("show");
            moveAnimalTooltip(event);
        }

        function moveAnimalTooltip(event) {
            const gap = 14;
            let left = event.clientX + gap;
            let top = event.clientY + gap;

            animalTooltip.style.left = "0px";
            animalTooltip.style.top = "0px";

            const rect = animalTooltip.getBoundingClientRect();

            if (left + rect.width > window.innerWidth - 8) {
                left = event.clientX - rect.width - gap;
            }

            if (top + rect.height > window.innerHeight - 8) {
                top = event.clientY - rect.height - gap;
            }

            animalTooltip.style.left = Math.max(8, left) + "px";
            animalTooltip.style.top = Math.max(8, top) + "px";
        }

        function hideAnimalTooltip() {
            animalTooltip.classList.remove("show");
        }

        function getAnimalImagePath(animal) {
            const name = (animal.name || "").trim();

            if (!name) return "";

            return `IMG/${name}.png`;
        }

        function normalizeAnimalImages() {
            data.animals.forEach(animal => {
                animal.image = getAnimalImagePath(animal);
            });
        }

        function updateImagePreview(imgBox, animal) {
            imgBox.innerHTML = "";

            const imagePath = getAnimalImagePath(animal);

            if (imagePath) {
                animal.image = imagePath;

                const img = document.createElement("img");
                img.src = imagePath;
                img.alt = animal.name || "動物圖片";
                img.onerror = () => {
                    imgBox.textContent = "圖片";
                };
                imgBox.appendChild(img);
            } else {
                imgBox.textContent = "圖片";
            }
        }

        function compactText(items) {
            if (items.length === 0) return "無";
            return items.join(" ");
        }

        function renderAnimals() {
            animalGrid.innerHTML = "";

            data.animals.forEach(animal => {
                const likeFoods = getFoodsByStatus(animal, "like");
                const dislikeFoods = getFoodsByStatus(animal, "dislike");

                const card = document.createElement("div");
                card.className = "animal-card";

                if (isAnimalCompleted(animal)) {
                    card.classList.add("completed-animal");
                }

                const head = document.createElement("div");
                head.className = "animal-head";

                const imgBox = document.createElement("div");
                imgBox.className = "animal-img-box";
                updateImagePreview(imgBox, animal);
                imgBox.addEventListener("mouseenter", event => showAnimalTooltip(event, animal));
                imgBox.addEventListener("mousemove", moveAnimalTooltip);
                imgBox.addEventListener("mouseleave", hideAnimalTooltip);

                const name = document.createElement("div");
                name.className = "animal-name";
                name.textContent = animal.name || "未命名動物";
                name.title = animal.name || "未命名動物";

                head.appendChild(imgBox);
                head.appendChild(name);

                const likeLine = document.createElement("div");
                likeLine.className = "pref-line";
                likeLine.innerHTML = `
                    <span class="pref-label">❤️</span>
                    <span class="pref-text ${likeFoods.length === 0 ? "empty" : ""}" title="${escapeHtml(compactText(likeFoods))}">${escapeHtml(compactText(likeFoods))}</span>
                `;

                const dislikeLine = document.createElement("div");
                dislikeLine.className = "pref-line";
                dislikeLine.innerHTML = `
                    <span class="pref-label">🚫</span>
                    <span class="pref-text ${dislikeFoods.length === 0 ? "empty" : ""}" title="${escapeHtml(compactText(dislikeFoods))}">${escapeHtml(compactText(dislikeFoods))}</span>
                `;

                card.appendChild(head);
                card.appendChild(likeLine);
                card.appendChild(dislikeLine);
                animalGrid.appendChild(card);
            });
        }

        loadData();
    </script>
</body>

</html>
